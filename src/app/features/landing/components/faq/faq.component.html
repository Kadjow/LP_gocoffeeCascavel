<section class="section faq">
  <div class="container faq__grid">
    <div appRevealOnScroll="40ms">
      <app-section-heading
        eyebrow="Operacao da loja"
        title="Informacoes claras para visitar, retirar ou pedir sem ruido."
        description="A pagina organiza os canais de acao da GoCoffee Cascavel sem prometer um fluxo que a operacao real nao oferece."
      />
    </div>

    <div class="faq__list">
      @for (item of items(); track item.question; let index = $index) {
        <details class="faq__item surface-panel" [appRevealOnScroll]="(index * 80 + 100) + 'ms'">
          <summary>{{ item.question }}</summary>
          <p>{{ item.answer }}</p>
        </details>
      }
    </div>
  </div>
</section>
