<section class="section experience" id="experiencia">
  <div class="container experience__grid">
    <div>
      <app-section-heading
        eyebrow="Experiência da marca"
        title="Café especial: sua pausa ideal, seu melhor encontro."
        description="Na GoCoffee Cascavel, cada detalhe é pensado para o seu momento. Do grão selecionado ao ambiente acolhedor, oferecemos uma experiência completa onde o atendimento impecável e nossa vitrine irresistível convidam você a ficar mais um pouco."
      />
    </div>

    <div class="experience__content">
      @for (pillar of business().experiencePillars; track pillar.title; let index = $index) {
        <article class="experience__card surface-panel">
          <span>0{{ index + 1 }}</span>
          <strong>{{ pillar.title }}</strong>
          <p>{{ pillar.description }}</p>
        </article>
      }
    </div>
  </div>
</section>
