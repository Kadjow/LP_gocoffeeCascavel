<section class="section faq">
  <div class="container faq__grid">
    <div>
      <app-section-heading
        eyebrow="Operacao da loja"
        title="Informacoes claras para visitar, retirar ou pedir sem ruido."
        description="A pagina organiza os canais de acao da GoCoffee Cascavel sem prometer um fluxo que a operacao real nao oferece."
      />
    </div>

    <div class="faq__list">
      @for (item of items(); track item.question; let index = $index) {
        <article
          class="faq__item surface-panel"
          [class.is-open]="openIndex() === index"
          appRevealOnScroll
          [appRevealOnScroll]="90 + (index * 70)"
        >
          <h3 class="faq__heading">
            <button
              class="faq__trigger"
              type="button"
              [attr.id]="'faq-trigger-' + index"
              [attr.aria-expanded]="openIndex() === index"
              [attr.aria-controls]="'faq-panel-' + index"
              (click)="toggleItem(index)"
            >
              <span class="faq__question">{{ item.question }}</span>
              <span class="faq__indicator" aria-hidden="true"></span>
            </button>
          </h3>

          <div
            class="faq__answer-shell"
            [attr.id]="'faq-panel-' + index"
            role="region"
            [attr.aria-labelledby]="'faq-trigger-' + index"
            [attr.aria-hidden]="openIndex() !== index"
          >
            <div class="faq__answer">
              <p>{{ item.answer }}</p>
            </div>
          </div>
        </article>
      }
    </div>
  </div>
</section>
