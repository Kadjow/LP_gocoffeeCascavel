<section class="section testimonials" id="avaliacoes">
  <div class="container testimonials__grid">
    <div>
      <app-section-heading
        eyebrow="Reputação local"
        title="Boa experiência percebida, com nota alta e elogios consistentes."
        description="A prova social reforça o ambiente aconchegante, o atendimento atencioso e a boa variedade de cafés e bebidas criativas."
      />

      <article class="testimonials__summary surface-panel" appRevealOnScroll [appRevealOnScroll]="90">
        <strong><span appCountUp [appCountUp]="business().rating" [countUpDecimals]="1"></span></strong>
        <div>
          <h3><span appCountUp [appCountUp]="business().reviewCount" countUpPrefix="+"></span> avaliações observadas</h3>
          <p>Os elogios se concentram em ambiente agradável, atendimento e variedade do cardápio.</p>
        </div>
      </article>
    </div>

    <div class="testimonials__list">
      @for (testimonial of testimonials(); track testimonial.name; let index = $index) {
        <article class="testimonials__card surface-panel" appRevealOnScroll [appRevealOnScroll]="120 + (index * 70)">
          <span>{{ testimonial.headline }}</span>
          <p>{{ testimonial.quote }}</p>
          <footer>
            <strong>{{ testimonial.name }}</strong>
            <small>{{ testimonial.context }}</small>
          </footer>
        </article>
      }
    </div>
  </div>
</section>
