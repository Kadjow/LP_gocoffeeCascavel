<header class="header" [class.header--scrolled]="scrolled()">
  <div class="container header__inner">
    <a class="header__brand" href="#inicio" aria-label="Voltar para o inicio">
      <span class="header__brand-mark">
        <img
          class="header__brand-logo"
          src="/images/gocoffee-icon.png"
          alt="Icone da GoCoffee Cascavel"
          decoding="async"
          fetchpriority="high"
        >
      </span>
      <span class="header__brand-copy">
        <strong>{{ business().name }}</strong>
        <small>{{ business().subtitle }}</small>
      </span>
    </a>

    <button
      type="button"
      class="header__toggle"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="header-navigation"
      aria-label="Abrir navegacao"
      (click)="toggleMenu()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="header__panel" id="header-navigation" [class.header__panel--open]="menuOpen()">
      <nav class="header__nav" aria-label="Navegacao principal">
        @for (item of navigation(); track item.fragment) {
          <a
            class="header__nav-link"
            [href]="'#' + item.fragment"
            [class.header__nav-link--active]="isActive(item.fragment)"
            [attr.aria-current]="isActive(item.fragment) ? 'page' : null"
            (click)="onNavigationClick(item.fragment)"
          >
            {{ item.label }}
          </a>
        }
      </nav>

      <div class="header__actions">
        <a
          class="btn btn--secondary"
          [href]="business().ifoodUrl"
          target="_blank"
          rel="noreferrer"
          aria-label="Abrir GoCoffee Cascavel no iFood"
          (click)="closeMenu()"
        >
          iFood
        </a>
        <a
          class="btn btn--primary"
          [href]="business().whatsappUrl"
          target="_blank"
          rel="noreferrer"
          aria-label="Falar com a GoCoffee Cascavel no WhatsApp"
          (click)="closeMenu()"
        >
          WhatsApp
        </a>
      </div>
    </div>
  </div>
</header>
